# Fox Terminal - Build APK
# Arquivo: .github/workflows/main.yml

name: Build Fox Terminal APK

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:

  build-apk:
    name: Compilar APK
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:

      # SEM "path: repo" — checkout direto na raiz
      # Isso corrige o erro de chown que quebrava a buildozer-action
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SDK e NDK Android
        uses: actions/cache@v5
        with:
          path: .buildozer_global
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-global-

      - name: Cache dependencias p4a
        uses: actions/cache@v5
        with:
          path: .buildozer
          key: buildozer-local-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-local-${{ runner.os }}-

      - name: Build com buildozer-action
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          workdir: .
          buildozer_version: stable
          command: >-
            pip3 install --user --upgrade Cython==0.29.33 virtualenv &&
            buildozer -v android debug

      - name: Verificar APK gerado
        if: always()
        run: |
          echo "=== bin/ ==="
          ls -lh bin/ 2>/dev/null || echo "bin/ nao encontrado"
          echo "=== filename output ==="
          echo "${{ steps.buildozer.outputs.filename }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: FoxTerminal-${{ github.run_number }}
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: warn

  create-release:
    name: Criar GitHub Release
    runs-on: ubuntu-22.04
    needs: build-apk
    if: startsWith(github.ref, 'refs/tags/v') && success()

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Baixar APK
        uses: actions/download-artifact@v4
        with:
          name: FoxTerminal-${{ github.run_number }}
          path: ./release

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          name: Fox Terminal ${{ github.ref_name }}
          body: |
            ## Fox Terminal ${{ github.ref_name }}

            ### Como instalar
            1. Baixe o `.apk` abaixo
            2. Configuracoes > Seguranca > Fontes desconhecidas
            3. Instale o `.apk`
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: ./release/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
