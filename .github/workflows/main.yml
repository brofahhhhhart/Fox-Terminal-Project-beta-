name: Build Fox Terminal APK

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1   # Action oficial recomendada pelo Kivy
        with:
          buildozer_version: stable
          command: |
            pip install --upgrade "Cython==0.29.36"
            yes | buildozer -v android debug
        timeout-minutes: 30

      - name: List generated files
        if: always()
        run: |
          echo "=== Conteúdo da pasta bin ==="
          ls -la bin/ || true
          echo "=== Procurando arquivos .apk ==="
          find . -name "*.apk" -type f || true

      - name: Upload APK Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fox-terminal-apk
          path: bin/*.apk
          if-no-files-found: warn
