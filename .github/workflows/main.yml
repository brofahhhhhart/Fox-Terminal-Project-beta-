name: Build Fox Terminal APK

on:
  push:
    branches: [ main ]

# Força Node.js 24 em todas as GitHub Actions (evita warnings e problemas futuros)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          buildozer_version: stable
          command: |
            echo "=== Atualizando Cython ==="
            pip install --upgrade "Cython==0.29.36"
            echo "=== Iniciando build (pode demorar 10-20 minutos) ==="
            yes | buildozer -v android debug
        timeout-minutes: 30

      - name: Show build result
        if: always()
        run: |
          echo "=== STATUS FINAL DO BUILD ==="
          ls -la bin/ || echo "Pasta bin não existe"
          find . -name "*.apk" -type f || echo "Nenhum APK encontrado"
