# Fox Terminal - Build APK
# Arquivo: .github/workflows/main.yml
#
# Abordagem: instalacao nativa do buildozer no runner Ubuntu.
# Sem Docker, sem buildozer-action — evita o bug de chown/user
# que quebra qualquer action baseada no container do buildozer.

name: Build Fox Terminal APK

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-apk:
    name: Compilar APK
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:

      - name: Checkout
        uses: actions/checkout@v6

      # Java 17 e necessario para o Gradle do Android SDK
      - name: Instalar Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      # Python 3.11
      - name: Instalar Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # Dependencias do sistema necessarias para compilar kivy/p4a
      - name: Instalar dependencias do sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip \
            libffi-dev libssl-dev \
            build-essential \
            libltdl-dev \
            autoconf automake libtool \
            pkg-config \
            lld

      # Cache do SDK/NDK — evita baixar 2-3 GB a cada build
      - name: Cache Android SDK e NDK
        uses: actions/cache@v5
        with:
          path: ~/.buildozer
          key: buildozer-home-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-home-${{ runner.os }}-

      # Cache da pasta .buildozer local (dependencias compiladas)
      - name: Cache build local
        uses: actions/cache@v5
        with:
          path: .buildozer
          key: buildozer-local-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-${{ github.sha }}
          restore-keys: |
            buildozer-local-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-
            buildozer-local-${{ runner.os }}-

      # Instala buildozer, Cython e python-for-android com suporte AAB
      - name: Instalar buildozer e Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install Cython==0.29.33
          pip install python-for-android
          pip install buildozer==1.5.0

      # Aceita licencas do Android SDK
      - name: Aceitar licencas Android SDK
        run: |
          mkdir -p ~/.android
          echo "count=0" > ~/.android/repositories.cfg

      # Compilar o APK
      - name: Compilar APK
        run: |
          yes | buildozer -v android debug
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}

      # Mostrar resultado
      - name: Verificar APK
        if: always()
        run: |
          echo "=== Conteudo de bin/ ==="
          ls -lh bin/ 2>/dev/null || echo "bin/ nao encontrado"
          echo "=== Todos APKs no projeto ==="
          find . -name "*.apk" 2>/dev/null | head -20

      # Upload do APK gerado
      - name: Upload APK
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: FoxTerminal-debug-${{ github.run_number }}
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: warn

  # Cria Release automatica ao fazer push de tag v*
  # Como usar: git tag v1.34.0 && git push --tags
  create-release:
    name: Criar GitHub Release
    runs-on: ubuntu-22.04
    needs: build-apk
    if: startsWith(github.ref, 'refs/tags/v') && success()

    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Baixar APK
        uses: actions/download-artifact@v7
        with:
          name: FoxTerminal-debug-${{ github.run_number }}
          path: ./release

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          name: Fox Terminal ${{ github.ref_name }}
          body: |
            ## Fox Terminal ${{ github.ref_name }}

            ### Como instalar no Android
            1. Baixe o arquivo `.apk` abaixo
            2. Va em Configuracoes > Seguranca > Fontes desconhecidas
            3. Abra o `.apk` e instale
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: ./release/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
