name: Build Fox Terminal Android App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    name: Build for Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          # O diretório de trabalho onde o buildozer.spec está localizado. Por padrão, é a raiz do repositório.
          workdir: .
          buildozer_version: stable
          # Comando para construir o APK de depuração. Pode ser 'buildozer android release' para um AAB de lançamento.
          command: buildozer android debug

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: foxterminal-apk
          path: ${{ steps.buildozer.outputs.filename }}
          
