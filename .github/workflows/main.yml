# Fox Terminal - Build APK
# Arquivo: .github/workflows/main.yml

name: Build Fox Terminal APK

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BUILDOZER_WARN_ON_ROOT: "0"

jobs:

  build-apk:
    name: Compilar APK
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Instalar Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Instalar Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Instalar dependencias do sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential \
            ccache \
            cmake \
            git \
            libffi-dev \
            libssl-dev \
            libtool \
            autoconf \
            automake \
            pkg-config \
            zip \
            unzip \
            zlib1g-dev \
            libncursesw5-dev \
            lld

      - name: Instalar Buildozer e Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36
          pip install buildozer

      - name: Compilar APK
        run: |
          buildozer -v android debug 2>&1 | tail -500

      - name: Verificar APK
        if: always()
        run: |
          echo "=== Conteudo de bin/ ==="
          ls -lh bin/ 2>/dev/null || echo "bin/ nao encontrado"
          echo "=== Todos APKs no projeto ==="
          find . -name "*.apk" -type f 2>/dev/null | head -20

      - name: Upload APK
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: FoxTerminal-debug-${{ github.run_number }}
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: warn

  create-release:
    name: Criar GitHub Release
    runs-on: ubuntu-22.04
    needs: build-apk
    if: startsWith(github.ref, 'refs/tags/v') && success()

    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Baixar APK
        uses: actions/download-artifact@v7
        with:
          name: FoxTerminal-debug-${{ github.run_number }}
          path: ./release

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          name: Fox Terminal ${{ github.ref_name }}
          body: |
            ## Fox Terminal ${{ github.ref_name }}

            ### Como instalar no Android
            1. Baixe o arquivo `.apk` abaixo
            2. Va em Configuracoes > Seguranca > Fontes desconhecidas
            3. Abra o `.apk` e instale
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: ./release/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
