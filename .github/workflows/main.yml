name: Build Fox Terminal APK

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build APK
        run: |
          yes | buildozer android debug
          echo "--- Listing bin directory ---"
          find . -name "*.apk" -type f
          ls -la bin/ || true

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: fox-terminal-apk
          path: |
            bin/*.apk
            .buildozer/android/platform/build-arm64-v8a/dists/foxterminal/build/outputs/apk/**/*.apk
          if-no-files-found: warn
          
