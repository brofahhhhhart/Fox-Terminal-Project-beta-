name: Build Fox Terminal APK

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK with Buildozer
        uses: docker://kivy/buildozer:latest   # ← Isso resolve o "command not found"
        with:
          args: buildozer -v android debug
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: List generated APK
        run: |
          ls -la bin/ || true
          find . -name "*.apk" -type f || true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fox-terminal-apk
          path: bin/*.apk
          if-no-files-found: warn
