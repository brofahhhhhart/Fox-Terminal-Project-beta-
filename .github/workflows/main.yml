name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          # Dependências adicionais para Buildozer/Kivy
          sudo apt install -y libsqlite3-dev sqlite3 bzip2 libbz2-dev libgdbm-dev libgdbm-compat-dev liblzma-dev libreadline-dev uuid-dev libxml2-dev libxmlsec1-dev tk-dev wget curl

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Build with Buildozer
        run: |
          # Aceita automaticamente os termos do SDK/NDK
          yes | buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: package
          path: bin/*.apk
          
