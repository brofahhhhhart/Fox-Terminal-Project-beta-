# ════════════════════════════════════════════════════════════════
#  Fox Terminal — GitHub Actions Build
#  Arquivo: .github/workflows/main.yml
#
#  Actions 2025 (obrigatorio):
#    actions/checkout@v4
#    actions/cache@v5
#    actions/upload-artifact@v4
#    actions/setup-python@v5
#    actions/download-artifact@v4
#    ArtemSBulgakov/buildozer-action@v1
#    softprops/action-gh-release@v2
#
#  move_binary.py foi removido — o upload do APK
#  agora e feito diretamente pelo upload-artifact@v4.
# ════════════════════════════════════════════════════════════════

name: Build Fox Terminal APK

on:
  push:
    branches: [main, master]
    tags:    ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:        # permite rodar manualmente na aba Actions

permissions:
  contents: write           # necessario para criar Releases

jobs:

  # ──────────────────────────────────────────────
  # JOB 1: Compilar o APK
  # ──────────────────────────────────────────────
  build-apk:
    name: Compilar APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:

      - name: Checkout do codigo
        uses: actions/checkout@v4

      # Cache do SDK/NDK (~4 GB) — reutilizado entre builds
      - name: Cache SDK e NDK Android
        uses: actions/cache@v5
        with:
          path: ~/.buildozer
          key: buildozer-sdk-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-sdk-${{ runner.os }}-

      # Instala dependencias do sistema necessarias para kivy/p4a
      - name: Instalar dependencias do sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            libffi-dev libssl-dev python3-pip \
            build-essential libltdl-dev \
            autoconf libtool pkg-config

      # Instala o buildozer e Cython compativel com kivy 2.x
      - name: Instalar Buildozer e Cython
        run: |
          pip3 install --upgrade pip
          pip3 install --upgrade \
            buildozer \
            Cython==0.29.33 \
            virtualenv

      # Compila o APK
      - name: Compilar APK (buildozer android debug)
        run: |
          buildozer -v android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      # Lista o APK gerado para confirmar
      - name: Verificar APK gerado
        run: |
          echo "=== Arquivos em bin/ ==="
          ls -lh bin/ || echo "Pasta bin/ nao encontrada"

      # Upload do APK — fica disponivel 30 dias na aba Actions
      - name: Upload APK como artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: FoxTerminal-APK-${{ github.run_number }}
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: warn

  # ──────────────────────────────────────────────
  # JOB 2: Criar Release ao fazer push de tag v*
  # Ex: git tag v1.34.0 && git push --tags
  # ──────────────────────────────────────────────
  create-release:
    name: Criar GitHub Release
    runs-on: ubuntu-latest
    needs: build-apk
    if: startsWith(github.ref, 'refs/tags/v')

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Baixar APK gerado
        uses: actions/download-artifact@v4
        with:
          name: FoxTerminal-APK-${{ github.run_number }}
          path: ./release

      - name: Criar Release com APK anexado
        uses: softprops/action-gh-release@v2
        with:
          name: Fox Terminal ${{ github.ref_name }}
          body: |
            ## Fox Terminal ${{ github.ref_name }}

            ### Como instalar no Android
            1. Baixe o arquivo `.apk` abaixo
            2. Abra o arquivo no celular
            3. Se necessario, ative **Fontes desconhecidas** em
               Configuracoes > Seguranca
            4. Instale normalmente

            ---
            Compilado automaticamente via GitHub Actions.
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: ./release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
