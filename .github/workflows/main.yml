# Workflow para compilar o APK do Fox Terminal usando Buildozer no GitHub Actions.
# Atualizado para Node.js 24 (Node 20 foi depreciado em 2025/2026).
name: Build Android APK

on: 
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do codigo
      uses: actions/checkout@v5

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Instalar dependencias do sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo5 \
          cmake \
          libffi-dev \
          libssl-dev

    - name: Instalar Buildozer e Cython
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    - name: Compilar APK
      run: |
        yes | buildozer android debug

    - name: Fazer upload do APK como artifact
      uses: actions/upload-artifact@v4
      with:
        name: fox-terminal-apk
        path: bin/*.apk
        
