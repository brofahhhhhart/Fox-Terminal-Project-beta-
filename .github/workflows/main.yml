# Fox Terminal - Build APK
# Arquivo: .github/workflows/main.yml

name: Build Fox Terminal APK

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  # Força Node.js 24 agora para evitar o aviso de depreciação
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Compilar o APK via Docker oficial
  # ─────────────────────────────────────────────
  build-apk:
    name: Compilar APK
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:

      - name: Checkout do codigo
        uses: actions/checkout@v4

      # Cache do SDK/NDK (~4 GB) — economiza 20-30min por build
      - name: Cache SDK e NDK Android
        uses: actions/cache@v5
        with:
          path: |
            ~/.buildozer/android/platform/android-sdk
            ~/.buildozer/android/platform/android-ndk-r25b
          key: android-sdk-ndk-${{ runner.os }}-r25b
          restore-keys: |
            android-sdk-ndk-${{ runner.os }}-

      # Cache das dependencias Python compiladas para aarch64
      - name: Cache dependencias Python/p4a
        uses: actions/cache@v5
        with:
          path: .buildozer
          key: buildozer-p4a-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-p4a-${{ runner.os }}-

      # Usa o Docker oficial do buildozer (muito mais estavel que pip install)
      # Cython 0.29.33 e obrigatorio — Cython 3.x quebra kivy 2.x
      - name: Compilar APK com Docker buildozer
        run: |
          docker run --rm \
            -v "$HOME/.buildozer":/home/user/.buildozer \
            -v "$PWD":/home/user/hostcwd \
            kivy/buildozer:latest \
            bash -c "
              cd /home/user/hostcwd &&
              pip install --quiet Cython==0.29.33 &&
              buildozer -v android debug 2>&1
            "

      # Mostra o APK gerado para confirmar
      - name: Listar APK gerado
        run: |
          echo "=== Conteudo de bin/ ==="
          ls -lh bin/ 2>/dev/null || echo "ATENCAO: pasta bin/ nao encontrada"
          echo "=== APKs encontrados ==="
          find . -name "*.apk" 2>/dev/null || echo "Nenhum APK encontrado"

      # Upload do APK — disponivel 30 dias na aba Actions
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: FoxTerminal-${{ github.run_number }}-APK
          path: |
            bin/*.apk
            **/*.apk
          retention-days: 30
          if-no-files-found: warn

  # ─────────────────────────────────────────────
  # JOB 2: GitHub Release ao fazer push de tag
  # Como usar: git tag v1.34.0 && git push --tags
  # ─────────────────────────────────────────────
  create-release:
    name: Criar GitHub Release
    runs-on: ubuntu-22.04
    needs: build-apk
    if: startsWith(github.ref, 'refs/tags/v') && success()

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Baixar APK gerado
        uses: actions/download-artifact@v4
        with:
          name: FoxTerminal-${{ github.run_number }}-APK
          path: ./release

      - name: Listar arquivos para release
        run: ls -lh ./release/

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          name: Fox Terminal ${{ github.ref_name }}
          body: |
            ## Fox Terminal ${{ github.ref_name }}

            ### Como instalar
            1. Baixe o arquivo `.apk` abaixo
            2. No Android: Configuracoes > Seguranca > Fontes desconhecidas
            3. Abra o arquivo `.apk` e instale

            Compilado automaticamente via GitHub Actions.
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: ./release/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
