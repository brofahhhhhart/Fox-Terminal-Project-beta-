name: Build Fox Terminal APK

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04   # mais estável que ubuntu-latest em alguns casos
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK with Buildozer
        run: |
          echo "=== Iniciando build do APK ==="
          
          # Atualiza Cython (versão mais compatível atualmente)
          pip install --upgrade "Cython==0.29.36"
          
          echo "=== Aceitando licenças do Android SDK ==="
          yes | buildozer -v android debug
          
          echo "=== Verificando arquivos gerados ==="
          ls -la bin/ || true
          find . -name "*.apk" -type f || true
        shell: bash
